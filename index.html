<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mang</title>
    <link rel="icon" href="favicon.png">
    
    <!-- 폰트: 도트 서체(DotGothic16) 및 세련된 고딕(Inter) 로드 -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=DotGothic16&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050507;
            --accent-neon: #00f0ff; /* 마우스 오버 시 라인 포인트 컬러 */
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'DotGothic16', sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 🎬 [신규] 3초간 작동하는 '로딩 중...' 오프닝 화면 */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: #000000;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            /* 2.6초 동안 유지 후 0.4초간 스르륵 사라짐 (총 3초) */
            animation: fadeOutScreen 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 2.6s; 
        }

        /* 로딩 텍스트 & 점 디자인 */
        .loading-text {
            font-size: 24px;
            letter-spacing: 2px;
            color: #ffffff;
            display: flex;
            align-items: center;
        }

        /* 도트 점(...)들이 순차적으로 튀는 애니메이션 */
        .dots span {
            animation: blink 1.2s infinite both;
        }
        .dots span:nth-child(1) { animation-delay: 0.2s; }
        .dots span:nth-child(2) { animation-delay: 0.4s; }
        .dots span:nth-child(3) { animation-delay: 0.6s; }

        @keyframes blink {
            0% { opacity: 0; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-4px); } /* 점이 살짝 위로 튕김 */
            100% { opacity: 0; transform: translateY(0); }
        }

        @keyframes fadeOutScreen {
            to { opacity: 0; visibility: hidden; }
        }

        /* 🖼 * 배경: 서서히 확대 + 앵글 무빙 (Ken Burns) */
        .bg-layer {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            will-change: transform, opacity;
        }

        .bg-layer.active {
            opacity: 1;
        }

        .bg-animate {
            animation: kenBurns 45s ease-in-out infinite alternate;
        }

        @keyframes kenBurns {
            0% { transform: scale(1.02) translate(0%, 0%) rotate(0deg); }
            100% { transform: scale(1.15) translate(-2.5%, -1.5%) rotate(0.3deg); }
        }

        /* 🕶️ 오버레이: 부드럽고 어두운 보랏빛 필터 */
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(5, 5, 8, 0.55) 0%,
                rgba(12, 6, 20, 0.75) 50%,
                rgba(5, 5, 8, 0.88) 100%
            );
            z-index: 3;
            pointer-events: none;
        }

        /* 🎴 메인 반응형 레이아웃 전체 컨테이너 */
        .master-container {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 900px;
            display: flex;
            gap: 40px;
            align-items: center;
            justify-content: center;
        }

        /* 📦 왼쪽: 바이오(소개) 프로필 박스 */
        .bio-panel {
            flex: 1;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--glass-border);
            padding: 45px 35px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            text-align: left;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            
            /* 로딩창이 걷히는 2.8초 시점에 부드럽게 등장 */
            opacity: 0;
            transform: translateY(30px);
            animation: panelFadeIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 2.7s; 
        }

        @keyframes panelFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .bio-title {
            font-size: 34px;
            letter-spacing: 2px;
            margin-bottom: 24px;
            color: #ffffff;
            line-height: 1.2;
        }

        .bio-text {
            font-size: 14px;
            color: #9c9c9c;
            line-height: 1.8;
            letter-spacing: 0.5px;
        }

        /* 📦 오른쪽: 계단식 메뉴 리스트 */
        .menu-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 440px;
        }

        /* 🔗 계단식 링크 카드 유닛 */
        .menu-card {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 22px 30px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #cdcdcd;
            text-decoration: none;
            font-size: 15px;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            
            /* 순차적으로 등장하는 스태거 애니메이션 */
            opacity: 0;
            transform: translateY(20px);
            animation: cardFadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 🕒 로딩 이후 순차적으로 켜지는 스태거 타임라인 설정 */
        .menu-card:nth-child(1) { animation-delay: 2.9s; width: 85%; align-self: flex-start; }
        .menu-card:nth-child(2) { animation-delay: 3.1s; width: 88%; align-self: flex-start; }
        .menu-card:nth-child(3) { animation-delay: 3.3s; width: 92%; align-self: flex-start; }
        .menu-card:nth-child(4) { animation-delay: 3.5s; width: 96%; align-self: flex-start; }
        .menu-card:nth-child(5) { animation-delay: 3.7s; width: 100%; align-self: flex-start; }

        /* 하단 언더라인 베이스 선 연출 */
        .menu-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent-neon);
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 💡 마우스 오버 시 상위호환 액션 */
        .menu-card:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(12px);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        .menu-card:hover::after {
            width: 100%;
        }

        /* 화살표 아이콘 */
        .menu-card span:last-child {
            font-size: 13px;
            opacity: 0.3;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .menu-card:hover span:last-child {
            opacity: 1;
            color: var(--accent-neon);
            transform: translateX(4px);
        }

        /* 📱 모바일 대응 가로폭 조절 */
        @media (max-width: 800px) {
            .master-container {
                flex-direction: column;
                gap: 30px;
                padding-top: 40px;
            }
            .bio-panel {
                max-width: 100%;
                width: 100%;
            }
            .menu-panel {
                max-width: 100%;
            }
            .menu-card {
                width: 100% !important;
            }
        }
    </style>
</head>
