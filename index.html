<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mang</title>
    <link rel="icon" href="favicon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050505;
            --color-1: #ff007f;
            --color-2: #7f00ff;
            --color-3: #00f0ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .bg-layer {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
            opacity: 0;
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1), 
                        transform .8s cubic-bezier(.22,1,.36,1);
            will-change: transform, opacity;
        }

        .bg-layer.active {
            opacity: 1;
        }

        .bg-animate {
            animation: kenBurns 40s ease-in-out infinite alternate;
        }

        @keyframes kenBurns {
            0% { transform: scale(1.02) translate(0%, 0%) rotate(0deg); }
            100% { transform: scale(1.12) translate(-2%, -1%) rotate(0.5deg); }
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(5, 5, 5, 0.5) 0%,
                rgba(10, 5, 15, 0.7) 50%,
                rgba(5, 5, 5, 0.9) 100%
            );
            z-index: 3;
            pointer-events: none;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(127, 0, 255, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
        }

        /* ==================== 카드 크기 확대 ==================== */
        .content {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 620px;           /* ← 키움 */
            padding: 56px 46px;         /* ← 키움 */
            text-align: center;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.2s;

            /* 카드가 자연스럽게 이어지게 하는 트랜지션 */
            transition: 
                transform .8s cubic-bezier(.22,1,.36,1),
                opacity .8s ease,
                filter .8s ease;
        }

        .content.leaving {
            transform: translateY(-25px) scale(1.04);
            opacity: 0;
            filter: blur(10px);
        }

        .name {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 84px;            /* ← 키움 */
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ffffff 30%, #a8a8a8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bio {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: #888888;
            margin-bottom: 48px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .nav-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 22px 36px;         /* ← 키움 */
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            color: #e5e5e5;
            text-decoration: none;
            font-size: 17px;            /* ← 키움 */
            font-weight: 500;
            letter-spacing: 0.5px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, var(--color-1), var(--color-2), var(--color-3));
            opacity: 0;
            z-index: -1;
            transition: opacity 0.4s ease;
        }

        .nav-btn:hover {
            color: #ffffff;
            border-color: transparent;
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 12px 28px rgba(127, 0, 255, 0.25);
        }

        .nav-btn:hover::before {
            opacity: 0.15;
        }

        .nav-btn:active {
            transform: translateY(-1px) scale(0.99);
        }

        .nav-btn span:last-child {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            opacity: 0.4;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .nav-btn:hover span:last-child {
            opacity: 1;
            color: var(--color-3);
            transform: translateX(6px);
        }

        /* 배경도 같이 움직이게 */
        body.leaving .bg-layer {
            transform: scale(1.08);
            filter: blur(6px);
        }

        @media (max-width: 480px) {
            .content {
                padding: 42px 28px;
                margin: 0 16px;
            }
            .name {
                font-size: 64px;
            }
            .nav-btn {
                padding: 18px 26px;
                font-size: 15.5px;
            }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="bg-layer bg-animate active" id="bg1"></div>
    <div class="bg-layer bg-animate" id="bg2"></div>
    <div class="bg-overlay"></div>
    <div class="bg-glow"></div>

    <div class="content">
        <h1 class="name">mang</h1>
        <p class="bio">character illustrator</p>

        <div class="nav">
            <a href="https://x.com/KRIMP1723322" class="nav-btn" target="_blank">
                <span>X (Twitter)</span>
                <span>→</span>
            </a>
            <a href="#" class="nav-btn" target="_blank">
                <span>Pixiv</span>
                <span>→</span>
            </a>
            <a href="#" class="nav-btn" target="_blank">
                <span>Commission</span>
                <span>→</span>
            </a>
            <a href="#" class="nav-btn" target="_blank">
                <span>YouTube</span>
                <span>→</span>
            </a>
            <a href="#" class="nav-btn" target="_blank">
                <span>Instagram</span>
                <span>→</span>
            </a>
        </div>
    </div>

    <script>
        const images = [
            'https://picsum.photos/id/1015/2000/1200',
            'https://picsum.photos/id/1005/2000/1200',
            'https://picsum.photos/id/1016/2000/1200'
        ];

        const bg1 = document.getElementById('bg1');
        const bg2 = document.getElementById('bg2');
        
        let currentIndex = 0;
        let isBg1Active = true;

        bg1.style.backgroundImage = `url('${images[0]}')`;
        bg2.style.backgroundImage = `url('${images[1]}')`;

        function startSlideshow() {
            setInterval(() => {
                currentIndex = (currentIndex + 1) % images.length;
                if (isBg1Active) {
                    bg2.style.backgroundImage = `url('${images[currentIndex]}')`;
                    bg2.classList.add('active');
                    bg1.classList.remove('active');
                } else {
                    bg1.style.backgroundImage = `url('${images[currentIndex]}')`;
                    bg1.classList.add('active');
                    bg2.classList.remove('active');
                }
                isBg1Active = !isBg1Active;
            }, 10000);
        }

        function initParallax() {
            let targetX = 0, targetY = 0;
            let currentX = 0, currentY = 0;

            document.addEventListener('mousemove', (e) => {
                targetX = (e.clientX / window.innerWidth - 0.5) * 30;
                targetY = (e.clientY / window.innerHeight - 0.5) * 30;
            });

            function animate() {
                currentX += (targetX - currentX) * 0.04;
                currentY += (targetY - currentY) * 0.04;
                bg1.style.transform = `translate(${currentX}px, ${currentY}px)`;
                bg2.style.transform = `translate(${currentX}px, ${currentY}px)`;
                requestAnimationFrame(animate);
            }
            animate();
        }

        // ==================== 링크 클릭 시 자연스러운 전환 ====================
        document.querySelectorAll(".nav-btn").forEach(btn => {
            btn.addEventListener("click", function(e) {
                const href = btn.getAttribute("href");

                // # 링크나 빈 링크는 무시
                if (!href || href === "#" || href.endsWith("#")) return;

                e.preventDefault();

                // leaving 클래스 추가 (카드 + 배경 애니메이션 시작)
                document.body.classList.add("leaving");
                document.querySelector(".content").classList.add("leaving");

                // 700ms 후 실제 이동
                setTimeout(() => {
                    window.location.href = href;
                }, 700);
            });
        });

        window.onload = function() {
            startSlideshow();
            initParallax();
        }
    </script>
</body>
</html>
