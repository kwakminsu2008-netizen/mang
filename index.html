<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mang</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-layer {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: 1;
            opacity: 0;
            transition: opacity 2.5s ease;
        }
        .bg-layer.active { opacity: 1; }

        .content {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 620px;           /* 박스 더 크게 */
            padding: 60px 55px;
            border: 1.5px solid rgba(255,255,255,0.25);
            border-radius: 8px;
            background: rgba(5,5,5,0.65);
            backdrop-filter: blur(20px);
            opacity: 0;
            transform: translateY(40px);
            animation: contentEnter 1.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            animation-delay: 3.8s;
        }

        .name {
            font-family: 'Syne', sans-serif;
            font-size: 72px;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 8px;
        }

        .bio {
            font-size: 15px;
            color: #aaa;
            margin-bottom: 45px;
            letter-spacing: 1px;
        }

        /* ==================== 레퍼런스 스타일 네비게이션 ==================== */
        .nav {
            display: flex;
            flex-direction: column;
            gap: 0;
            position: relative;
        }

        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            padding: 14px 0;
            color: #ddd;
            text-decoration: none;
            font-size: 15.5px;
            transition: color 0.3s ease;
        }

        .nav-item:hover {
            color: #fff;
        }

        /* 얇은 연결선 (레퍼런스 스타일) */
        .nav-item::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.25);
        }

        .nav-item:last-child::after {
            display: none;
        }

        .nav-item span {
            position: relative;
            z-index: 2;
            background: #050505;
            padding-right: 12px;
        }

        /* 소셜 아이콘 부분 (수직 연결) */
        .socials {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin: 35px 0 50px;
            position: relative;
        }

        .socials::before {
            content: '';
            position: absolute;
            left: 18px;
            top: 8px;
            bottom: 8px;
            width: 1px;
            background: rgba(255,255,255,0.25);
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 14px;
            color: #ddd;
            text-decoration: none;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            color: #fff;
            transform: translateX(4px);
        }

        .social-link span {
            width: 22px;
            text-align: center;
        }

        /* ==================== 애니메이션 ==================== */
        @keyframes contentEnter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-item {
            opacity: 0;
            transform: translateY(20px);
            animation: navItemEnter 1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .nav-item:nth-child(1) { animation-delay: 4.3s; }
        .nav-item:nth-child(2) { animation-delay: 4.5s; }
        .nav-item:nth-child(3) { animation-delay: 4.7s; }
        .nav-item:nth-child(4) { animation-delay: 4.9s; }
        .nav-item:nth-child(5) { animation-delay: 5.1s; }

        .social-link {
            opacity: 0;
            transform: translateX(-15px);
            animation: socialEnter 0.9s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .social-link:nth-child(1) { animation-delay: 4.4s; }
        .social-link:nth-child(2) { animation-delay: 4.55s; }
        .social-link:nth-child(3) { animation-delay: 4.7s; }
        .social-link:nth-child(4) { animation-delay: 4.85s; }
        .social-link:nth-child(5) { animation-delay: 5.0s; }

        @keyframes navItemEnter {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes socialEnter {
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <!-- 배경 -->
    <div class="bg-layer active" id="bg1" style="background-image: url('https://picsum.photos/id/1015/2000/1200');"></div>

    <!-- 메인 콘텐츠 -->
    <div class="content">
        <h1 class="name">mang</h1>
        <p class="bio">character illustrator</p>

        <!-- 소셜 (레퍼런스처럼 수직 선 연결) -->
        <div class="socials">
            <a href="https://x.com/KRIMP1723322" class="social-link" target="_blank">
                <span>X</span>
            </a>
            <a href="#" class="social-link" target="_blank">
                <span>Pixiv</span>
            </a>
            <a href="#" class="social-link" target="_blank">
                <span>Instagram</span>
            </a>
            <a href="#" class="social-link" target="_blank">
                <span>Discord</span>
            </a>
            <a href="#" class="social-link" target="_blank">
                <span>Email</span>
            </a>
        </div>

        <!-- 메뉴 (레퍼런스처럼 선으로 연결) -->
        <div class="nav">
            <a href="#" class="nav-item"><span>know about me</span></a>
            <a href="#" class="nav-item"><span>commissions</span></a>
            <a href="#" class="nav-item"><span>humble blog</span></a>
            <a href="#" class="nav-item"><span>art gallery</span></a>
            <a href="#" class="nav-item"><span>neat stuff</span></a>
        </div>
    </div>

    <script>
        // 배경 슬라이드쇼 (부드럽게)
        const bg1 = document.getElementById('bg1');
        setInterval(() => {
            bg1.style.transition = 'opacity 2.5s ease';
            bg1.style.opacity = '0';
            setTimeout(() => {
                bg1.style.backgroundImage = `url('https://picsum.photos/id/${Math.floor(Math.random()*20)+1005}/2000/1200')`;
                bg1.style.opacity = '1';
            }, 2500);
        }, 12000);
    </script>
</body>
</html>
